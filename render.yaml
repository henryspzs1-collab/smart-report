services:
  - type: web
    name: smart-report
    runtime: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn smart_report:app --workers 1 --timeout 120 --max-requests 300 --max-requests-jitter 50
    envVars:
      - key: DATA_FILE
        value: /data/bateria_data.json
    disk:
      name: smart-report-data
      mountPath: /data
      sizeGB: 1
